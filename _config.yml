title: Coink | DO BOOM!
copyright_start_year: 2015
author:
  name: CoinkWang
  email: cn.coink.wang@gmail.com
description: > # this means to ignore newlines until "show_subtitle:"
  Coink's Blog

show_subtitle: true

# 主题样式切换：
#   bugatti — 新版，Bugatti 风格（纯黑底 + 白色全大写宽间距，无装饰，默认）
#   claude  — Anthropic Claude 风格（暖米黄 + 珊瑚 + 衬线）
#   apple   — Apple 风格（白底 + 深蓝 + SF Pro，无衬线）
#   denise  — Denise Chandler 风格（黄油奶黄底 + 珊瑚红 + 手写 Caveat 标题 + 贴纸卡片）
#   glance  — 旧版，PaperCSS 手绘风格
theme_style: glance

header_pages:
  - about.md
  - links.md

permalink: /:title.html

# date format
# refer to https://shopify.github.io/liquid/filters/date/ if you want to customize this
glance:
  date_format: "%Y-%m-%d"

# Build settings
# theme: glance

plugins:
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-paginate

# 添加分页配置
paginate: 10  # 每页显示的文章数量
paginate_path: "/page/:num/"  # 分页URL路径格式 
